name: swe_dashboard
description: Swiss Ephemeris Dashboard — complete GUI for every Swiss Ephemeris calculation.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  swisseph: ^0.4.3
  toml: ^0.18.0
  path: ^1.9.0
  cupertino_icons: ^1.0.8
  file_saver: ^0.3.1
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  file_picker: ^10.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/ephe/
